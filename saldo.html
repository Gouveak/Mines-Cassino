<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Definir Saldo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="saldo.css">
</head>
<body>

    <div class="form-container">
        <h2>Definir saldo inicial</h2>

        <input type="number" id="saldoInput" placeholder="Digite seu saldo">

        <button onclick="salvarSaldo()">Salvar</button>
    </div>

    <script>
        function salvarSaldo() {
            let valor = document.getElementById("saldoInput").value;

            if (valor <= 0) {
                alert("Digite um valor válido");
                return;
            }

            localStorage.setItem("saldo", valor);

            window.location.href = "index.html";
        }
    </script>

</body>
</html>
