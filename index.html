<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Definir Saldo</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="src/saldo.css">
</head>

<body>

   <div class="form-container">
    <div class="form-box">

        <div class="topo">
            <h1>🔥 Cassino Royale</h1>
            <p>Defina seu saldo inicial</p>
        </div>

        <div class="destaque">
            <span>💰</span>
            <p>Saldo mínimo: 10 fichas</p>
        </div>

        <input 
            type="number" 
            id="saldoInput" 
            placeholder="Digite seu saldo" 
        />

        <button id="btnSalvarSaldo">Entrar no jogo</button>

        <div class="info">
            Esse saldo será usado na partida
        </div>

    </div>
</div>

    <script src="src/js/saldo.js"></script>
    

</body>

</html>
