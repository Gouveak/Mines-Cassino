<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Definir Saldo</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="src/saldo.css">
</head>

<body>
    <header class="header">
        <nav class="nav">
    <h1 class="titulo">Mines</h1>
    <a href="jogo.html" class="link-saldo">Jogar</a>
</nav>
    </header>
   <div class="form-container">
    <div class="form-box">

        <div class="topo">
            <h1><img src="src/assets/imagens/dsbet.png" alt="logo" class="logo-capi"> DSBet</h1>
            <p>Defina seu saldo inicial</p>
        </div>

        <div class="destaque">
            <span>💰</span>
            <p>Saldo mínimo: 10 fichas</p>
        </div>

        <input 
            type="number" 
            id="saldoInput" 
            placeholder="Digite seu saldo" 
        />

        <button id="btnSalvarSaldo">Entrar no jogo</button>

        <div class="info">
            Esse saldo será usado na partida
        </div>

    </div>
</div>

    <footer class="footer">
        <div class="footer-content">

            <h2 class="footer-logo">MINES</h2>

            <p class="footer-text">
                Jogue sem responsabilidade. Proibido para maiores de 18 anos.
            </p>

            <div class="footer-links">
                <a>Termos</a>
                <a>Privacidade</a>
                <a>Suporte</a>
            </div>

            <p class="footer-copy">
                © 2026 DSBet - Todos os direitos reservados
            </p>

        </div>
    </footer>

    <script src="src/js/saldo.js"></script>
    

</body>

</html>
