<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="src/style.css">
    <title>Mines</title>
</head>
<body>
   <header class="header">
    <nav class="nav">

        <h1 class="titulo">Mines</h1>

        <div class="logo">

        </div>

        
        <a href="saldo.html" class="link-saldo">Definir saldo</a>

    </nav>
</header>
    <main>
        <section class="caixas-ganho">

                    <h1>Aposta</h1>

                </div>
                <div class="caixa-multiplicador">

            </div>
        </section>

        </section>

    <script src="src/script.js"></script>
